<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Incoming Attack Calculator</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top, #172554 0%, #0b1120 45%, #050816 100%);
  font-family: Inter, Arial, sans-serif;
  color:white;
}

.wrapper{
  width:100%;
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:460px;
  background:rgba(15,23,42,0.82);
  border:1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(14px);
  border-radius:24px;
  padding:22px;
  box-shadow:
    0 10px 40px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.04);
}

.nav{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.nav button{
  flex:1;
  background:#111827;
}

.nav-active{
  background:linear-gradient(135deg,#2563eb,#1d4ed8)!important;
}

.title{
  text-align:center;
  font-size:22px;
  font-weight:700;
  margin-bottom:22px;
}

.input-box{
  width:100%;
  background:#0f172a;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:16px;
  padding:15px;
  color:white;
  font-size:14px;
  outline:none;
  margin-bottom:14px;
}

.input-box::placeholder{
  color:rgba(255,255,255,0.45);
}

.section-label{
  font-size:12px;
  opacity:0.65;
  margin-top:12px;
  margin-bottom:10px;
}

.button-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:16px;
}

.stack{
  display:flex;
  flex-direction:column;
  gap:8px;
}

button{
  border:none;
  border-radius:14px;
  padding:13px 10px;
  color:white;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  transition:0.15s;
}

button:active{
  transform:scale(0.97);
}

.hour-btn{
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

.min-btn{
  background:linear-gradient(135deg,#9333ea,#7e22ce);
}

.generate{
  width:100%;
  background:linear-gradient(135deg,#0f766e,#14b8a6);
  margin-top:8px;
}

.clear-btn{
  width:100%;
  background:linear-gradient(135deg,#b91c1c,#dc2626);
  margin-top:10px;
}

.copy-btn{
  width:100%;
  background:linear-gradient(135deg,#16a34a,#22c55e);
  margin-top:12px;
}

.deff-btn{
  width:100%;
  background:linear-gradient(135deg,#ca8a04,#eab308);
  margin-top:12px;
  color:black;
}

.output{
  margin-top:20px;
  background:#0b1220;
  border:1px solid rgba(255,255,255,0.05);
  border-radius:18px;
  padding:18px;
  white-space:pre-wrap;
  font-size:13px;
  line-height:1.7;
  color:#dbeafe;
  min-height:140px;
}

.hidden{
  display:none;
}

@media(max-width:480px){

  .container{
    padding:18px;
  }

  button{
    font-size:11px;
  }

}

</style>
</head>

<body>

<div class="wrapper">

<div class="container">

<div class="nav">
  <button id="navCalc" class="nav-active" onclick="showPage('calc')">
    Attack Calculator
  </button>

  <button id="navDeff" onclick="showPage('deff')">
    Deff Call Maker
  </button>
</div>

<!-- PAGE 1 -->

<div id="calcPage">

<div class="title">⚔️ Incoming Attack Calculator</div>

<input
  id="input"
  class="input-box"
  placeholder="Enter time. Example: 2h 30 min"
/>

<input
  id="serverTime"
  class="input-box"
  placeholder="Exact server landing attack time. Example: 16:30"
/>

<div class="section-label">Hours</div>

<div class="button-grid">

<div class="stack">
<button class="hour-btn" onclick="addHours(1)">+1h</button>
<button class="hour-btn" onclick="removeHours(1)">-1h</button>
</div>

<div class="stack">
<button class="hour-btn" onclick="addHours(2)">+2h</button>
<button class="hour-btn" onclick="removeHours(2)">-2h</button>
</div>

<div class="stack">
<button class="hour-btn" onclick="addHours(3)">+3h</button>
<button class="hour-btn" onclick="removeHours(3)">-3h</button>
</div>

<div class="stack">
<button class="hour-btn" onclick="addHours(6)">+6h</button>
<button class="hour-btn" onclick="removeHours(6)">-6h</button>
</div>

</div>

<div class="section-label">Minutes</div>

<div class="button-grid">

<div class="stack">
<button class="min-btn" onclick="addMinutes(1)">+1m</button>
<button class="min-btn" onclick="removeMinutes(1)">-1m</button>
</div>

<div class="stack">
<button class="min-btn" onclick="addMinutes(10)">+10m</button>
<button class="min-btn" onclick="removeMinutes(10)">-10m</button>
</div>

<div class="stack">
<button class="min-btn" onclick="addMinutes(15)">+15m</button>
<button class="min-btn" onclick="removeMinutes(15)">-15m</button>
</div>

<div class="stack">
<button class="min-btn" onclick="addMinutes(30)">+30m</button>
<button class="min-btn" onclick="removeMinutes(30)">-30m</button>
</div>

</div>

<button class="generate" onclick="generate()">
Generate Discord Timer
</button>

<button class="clear-btn" onclick="clearAll()">
Clear
</button>

<div class="output" id="output">
Your Discord timer will appear here...
</div>

<button class="copy-btn" onclick="copyOutput()">
Copy To Discord
</button>

<button class="deff-btn" onclick="showPage('deff')">
Make Full Deff Call
</button>

</div>

<!-- PAGE 2 -->

<div id="deffPage" class="hidden">

<div class="title">🛡️ Deff Call Maker</div>

<input class="input-box" id="attacker" placeholder="1. Name of the attacker">
<input class="input-box" id="village" placeholder="2. Which village you need defence">
<input class="input-box" id="arrival" placeholder="3. Exact time the attack will arrive">
<input class="input-box" id="waves" placeholder="4. How many waves">
<input class="input-box" id="tower" placeholder="5. Watch Tower level">
<input class="input-box" id="food" placeholder="6. Food situation">
<input class="input-box" id="granary" placeholder="7. Total size of your granary">
<input class="input-box" id="troops" placeholder="8. Current defensive troops">
<input class="input-box" id="needed" placeholder="9. How much extra troops you need">

<div class="output" id="deffOutput">
Your deff call will appear here...
</div>

<button class="copy-btn" onclick="generateDeffCall()">
Copy To Discord
</button>

</div>

</div>

</div>

<script>

function showPage(page){

  document.getElementById("calcPage").classList.add("hidden");
  document.getElementById("deffPage").classList.add("hidden");

  document.getElementById("navCalc").classList.remove("nav-active");
  document.getElementById("navDeff").classList.remove("nav-active");

  if(page === "calc"){
    document.getElementById("calcPage").classList.remove("hidden");
    document.getElementById("navCalc").classList.add("nav-active");
  } else {
    document.getElementById("deffPage").classList.remove("hidden");
    document.getElementById("navDeff").classList.add("nav-active");
  }
}

function parseInput(str){

  let h = 0;
  let m = 0;

  const hr = str.match(/(\d+)\s*h/i);
  const mn = str.match(/(\d+)\s*m/i);

  if(hr) h = parseInt(hr[1]);
  if(mn) m = parseInt(mn[1]);

  return Math.max((h * 60) + m, 0);
}

function updateInput(total){

  total = Math.max(total, 0);

  const h = Math.floor(total / 60);
  const m = total % 60;

  document.getElementById("input").value =
    `${h}h ${m}m`;
}

function addHours(h){
  updateInput(parseInput(input.value) + h * 60);
}

function removeHours(h){
  updateInput(parseInput(input.value) - h * 60);
}

function addMinutes(m){
  updateInput(parseInput(input.value) + m);
}

function removeMinutes(m){
  updateInput(parseInput(input.value) - m);
}

let finalText = "";

function generate(){

  let totalMinutes = 0;

  const durationInput =
    document.getElementById("input").value.trim();

  const serverInput =
    document.getElementById("serverTime").value.trim();

  if(durationInput){
    totalMinutes = parseInput(durationInput);
  }

  else if(serverInput){

    const now = new Date();

    const parts = serverInput.split(":");

    if(parts.length !== 2){
      output.innerText = "❌ Invalid server time.";
      return;
    }

    const target = new Date();

    target.setHours(parseInt(parts[0]));
    target.setMinutes(parseInt(parts[1]));
    target.setSeconds(0);

    if(target < now){
      target.setDate(target.getDate() + 1);
    }

    totalMinutes =
      Math.floor((target - now) / 60000);
  }

  else{
    output.innerText =
      "❌ Fill in either duration or exact server landing time.";
    return;
  }

  const future =
    Date.now() + (totalMinutes * 60000);

  const unix =
    Math.floor(future / 1000);

  finalText =
`⚔️ Attack Incoming

📅 Landing Time:
<t:${unix}:F>

⏳ Live Countdown:
<t:${unix}:R>`;

  output.innerText = finalText;
}

function copyOutput(){

  if(!finalText) return;

  navigator.clipboard.writeText(finalText);

  const btn =
    document.querySelector(".copy-btn");

  btn.innerText = "✓ Copied";

  setTimeout(() => {
    btn.innerText = "Copy To Discord";
  }, 1800);
}

function clearAll(){

  input.value = "";
  serverTime.value = "";

  output.innerText =
    "Your Discord timer will appear here...";

  finalText = "";
}

function generateDeffCall(){

  const text =
`🛡️ DEFF CALL

⚔️ Attacker:
${attacker.value}

🏘️ Village:
${village.value}

⏰ Arrival Time:
${arrival.value}

🌊 Waves:
${waves.value}

🗼 Watch Tower:
${tower.value}

🍞 Food Situation:
${food.value}

🏦 Granary Size:
${granary.value}

🛡️ Current Defence:
${troops.value}

📦 Extra Troops Needed:
${needed.value}`;

  deffOutput.innerText = text;

  navigator.clipboard.writeText(text);

  const btns =
    document.querySelectorAll(".copy-btn");

  btns[1].innerText = "✓ Copied";

  setTimeout(() => {
    btns[1].innerText = "Copy To Discord";
  }, 1800);
}

</script>

</body>
</html>
