<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attack Timer Calculator</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top, #172554 0%, #0b1120 45%, #050816 100%);
  font-family: Inter, Arial, sans-serif;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:420px;
  background:rgba(15,23,42,0.82);
  border:1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(14px);
  border-radius:24px;
  padding:24px;
  box-shadow:
    0 10px 40px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.04);
}

.title{
  text-align:center;
  font-size:22px;
  font-weight:700;
  margin-bottom:4px;
  letter-spacing:0.2px;
}

.subtitle{
  text-align:center;
  font-size:12px;
  opacity:0.6;
  margin-bottom:24px;
}

.input-box{
  width:100%;
  background:#0f172a;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:16px;
  padding:16px;
  color:white;
  font-size:16px;
  outline:none;
  margin-bottom:20px;
}

.section-label{
  font-size:12px;
  opacity:0.65;
  margin-bottom:10px;
  margin-top:10px;
  padding-left:2px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-bottom:16px;
}

button{
  border:none;
  border-radius:14px;
  padding:14px 12px;
  color:white;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.15s ease;
}

button:active{
  transform:scale(0.97);
}

.hour-btn{
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

.hour-btn:hover{
  filter:brightness(1.08);
}

.min-btn{
  background:linear-gradient(135deg,#9333ea,#7e22ce);
}

.min-btn:hover{
  filter:brightness(1.08);
}

.generate{
  width:100%;
  background:linear-gradient(135deg,#0f766e,#14b8a6);
  margin-top:8px;
  font-size:14px;
  padding:15px;
}

.output{
  margin-top:20px;
  background:#0b1220;
  border:1px solid rgba(255,255,255,0.05);
  border-radius:18px;
  padding:18px;
  white-space:pre-wrap;
  font-size:13px;
  line-height:1.7;
  color:#dbeafe;
  min-height:170px;
}

.copy-btn{
  width:100%;
  margin-top:14px;
  background:linear-gradient(135deg,#16a34a,#22c55e);
  padding:15px;
  font-size:14px;
}

.footer{
  text-align:center;
  margin-top:18px;
  font-size:11px;
  opacity:0.45;
}

@media (max-width:480px){

  .container{
    padding:18px;
    border-radius:20px;
  }

  .title{
    font-size:20px;
  }

  button{
    padding:13px 10px;
    font-size:12px;
  }

}

</style>
</head>

<body>

<div class="container">

<div class="title">⚔️ Attack Timer Calculator</div>
<div class="subtitle">Made by Legion of Chaos [LoS]</div>

<input
  id="input"
  class="input-box"
  placeholder="e.g. 2h 30m"
/>

<div class="section-label">Hours</div>

<div class="grid">

<button class="hour-btn" onclick="addHours(1)">+1 Hour</button>
<button class="hour-btn" onclick="addHours(2)">+2 Hours</button>
<button class="hour-btn" onclick="addHours(3)">+3 Hours</button>
<button class="hour-btn" onclick="addHours(6)">+6 Hours</button>

</div>

<div class="section-label">Minutes</div>

<div class="grid">

<button class="min-btn" onclick="addMinutes(30)">+30 Min</button>
<button class="min-btn" onclick="addMinutes(15)">+15 Min</button>
<button class="min-btn" onclick="addMinutes(10)">+10 Min</button>
<button class="min-btn" onclick="addMinutes(1)">+1 Min</button>

</div>

<button class="generate" onclick="generate()">
Generate Discord Timer
</button>

<div class="output" id="output">
Your Discord timer will appear here...
</div>

<button class="copy-btn" onclick="copyOutput()">
Copy To Discord
</button>

<div class="footer">
Legion of Chaos [LoS]
</div>

</div>

<script>

function parseInput(str){

  let h = 0;
  let m = 0;

  const hr = str.match(/(\d+)\s*h/i);
  const mn = str.match(/(\d+)\s*m/i);

  if(hr) h = parseInt(hr[1]);
  if(mn) m = parseInt(mn[1]);

  return (h * 60) + m;
}

function updateInput(total){

  const h = Math.floor(total / 60);
  const m = total % 60;

  document.getElementById("input").value =
    `${h}h ${m}m`;
}

function addHours(hours){

  let total =
    parseInput(document.getElementById("input").value);

  total += hours * 60;

  updateInput(total);
}

function addMinutes(minutes){

  let total =
    parseInput(document.getElementById("input").value);

  total += minutes;

  updateInput(total);
}

let finalText = "";

function generate(){

  const input =
    document.getElementById("input").value;

  const totalMinutes =
    parseInput(input);

  if(!totalMinutes){

    document.getElementById("output").innerText =
      "❌ Invalid format. Example: 2h 30m";

    return;
  }

  const future =
    Date.now() + (totalMinutes * 60000);

  const unix =
    Math.floor(future / 1000);

  const h =
    Math.floor(totalMinutes / 60);

  const m =
    totalMinutes % 60;

  finalText =
`⚔️ Attack Timer

⏳ Duration:
${h}h ${m}m

📅 Landing Time:
<t:${unix}:F>

⏳ Live Countdown:
<t:${unix}:R>`;

  document.getElementById("output").innerText =
    finalText;
}

function copyOutput(){

  if(!finalText) return;

  navigator.clipboard.writeText(finalText);

  const btn =
    document.querySelector(".copy-btn");

  btn.innerText = "✓ Copied";

  setTimeout(() => {
    btn.innerText = "Copy To Discord";
  }, 1800);
}

</script>

</body>
</html>
