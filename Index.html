<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attack Timer</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 20px;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 420px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}

.buttons {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

button {
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  background: #1e293b;
  color: white;
}

button:hover {
  background: #334155;
}

.generate {
  width: 100%;
  background: #2563eb;
  font-size: 16px;
}

.output {
  margin-top: 15px;
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  white-space: pre-wrap;
}

.copy {
  margin-top: 10px;
  width: 100%;
  background: #22c55e;
}
</style>
</head>

<body>

<div class="container">

<h2>⚔️ Attack Timer</h2>

<input id="input" placeholder="e.g. 2h 30m">

<div class="buttons">
  <button onclick="addTime(60)">+1h</button>
  <button onclick="addTime(30)">+30m</button>
  <button onclick="addTime(10)">+10m</button>
</div>

<button class="generate" onclick="generate()">Generate</button>

<div class="output" id="output">Result will appear here...</div>

<button class="copy" onclick="copyText()">Copy</button>

</div>

<script>

function parseDuration(str) {
  let h = 0, m = 0;

  const hr = str.match(/(\d+)\s*h/);
  const mn = str.match(/(\d+)\s*m/);

  if (hr) h = parseInt(hr[1]);
  if (mn) m = parseInt(mn[1]);

  return (h * 60 + m);
}

function addTime(minutes) {
  let current = document.getElementById("input").value;
  let base = parseDuration(current);
  base += minutes;

  let h = Math.floor(base / 60);
  let m = base % 60;

  document.getElementById("input").value = `${h}h ${m}m`;
}

let lastOutput = "";

function generate() {
  const input = document.getElementById("input").value;
  const minutes = parseDuration(input);

  if (!minutes) {
    document.getElementById("output").innerText = "❌ Invalid format (use 2h 30m)";
    return;
  }

  const ms = minutes * 60 * 1000;
  const unix = Math.floor((Date.now() + ms) / 1000);

  lastOutput =
`⚔️ Attack Timer

📅 Time:
<t:${unix}:F>

⏳ Countdown:
<t:${unix}:R>

📋 Discord ready`;

  document.getElementById("output").innerText = lastOutput;
}

function copyText() {
  navigator.clipboard.writeText(lastOutput);
  alert("Copied!");
}

</script>

</body>
</html>
